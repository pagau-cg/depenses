<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f7f5;--bg3:#eeede8;
  --text:#1a1a18;--text2:#6b6b64;--text3:#9b9b92;
  --border:rgba(0,0,0,0.11);--border2:rgba(0,0,0,0.20);
  --blue:#1a6fbf;--blue-bg:#e8f1fb;--blue-light:#d0e6f8;
  --green:#2d7a3a;--green-bg:#e6f4e8;
  --red:#b83232;--red-bg:#fceaea;
  --amber:#9a6200;--amber-bg:#fff4d6;--amber-border:rgba(154,98,0,0.25);
  --radius:10px;--radius-sm:7px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1c1c1a;--bg2:#242421;--bg3:#2e2e2a;--text:#f0efe9;--text2:#a0a098;--text3:#6a6a62;--border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.18);}
}
body{font-family:'Georgia','Times New Roman',serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.wrap{max-width:800px;margin:0 auto;padding:1.75rem 1.25rem}
h1{font-size:22px;font-weight:normal;letter-spacing:-0.4px}
input,select,textarea{font-family:inherit;font-size:13px;padding:8px 11px;width:100%;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
button{font-family:inherit;cursor:pointer;transition:all .12s}
.btn{padding:6px 14px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:13px}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue);padding:8px 20px;font-size:14px;border-radius:var(--radius-sm)}
.btn-primary:hover{opacity:.88}
.btn-visa{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);padding:8px 16px;font-size:13px;border-radius:var(--radius-sm)}
.btn-visa:hover{opacity:.85}
.btn-ghost{border:none;background:none;padding:4px 8px;font-size:12px;color:var(--text3)}
.btn-ghost:hover{color:var(--red)}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin:1.25rem 0}
.card{background:var(--bg2);border-radius:var(--radius);padding:.85rem 1rem}
.card-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.card-val{font-size:19px;color:var(--text)}
.card-val.warn{color:var(--amber)}
.card-val.ok{color:var(--green)}
table{width:100%;border-collapse:collapse}
th{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;padding:7px 11px;border-bottom:1px solid var(--border);font-weight:normal;text-align:left}
td{padding:9px 11px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:var(--bg2)}
tr.starred td{background:var(--amber-bg)}
tr.starred:hover td{background:#fff0c0}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:3px;white-space:nowrap;font-family:sans-serif}
.amt{text-align:right;font-variant-numeric:tabular-nums;font-size:13px;white-space:nowrap}
.amt.big{color:var(--amber)}
.drop-zone{border:1.5px dashed var(--border2);border-radius:var(--radius);padding:1.4rem;text-align:center;cursor:pointer;transition:all .15s;margin:1.1rem 0}
.drop-zone:hover,.drag-over{background:var(--blue-bg);border-color:var(--blue)}
.dz-title{font-size:14px;margin-bottom:5px}
.dz-sub{font-size:12px;color:var(--text3);margin-bottom:12px}
.dz-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.field{margin-bottom:13px}
.field label{font-size:12px;color:var(--text2);display:block;margin-bottom:5px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.cat-chip{padding:9px 6px;border-radius:var(--radius-sm);font-size:12px;border:2px solid transparent;cursor:pointer;font-family:inherit;text-align:center;transition:all .1s;line-height:1.3}
.cat-chip.selected{border-color:currentColor;font-weight:bold}
.cat-chip:hover{opacity:.85}
.pill-row{display:flex;gap:6px;margin-bottom:11px;flex-wrap:wrap;align-items:center}
.pill{padding:4px 11px;border-radius:20px;font-size:12px;border:1px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;font-family:inherit}
.pill.active{background:var(--blue-bg);color:var(--blue);border-color:var(--blue)}
.pill.amber-pill.active{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-border)}
.rcpt-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;flex-shrink:0}
.rcpt-ok{color:var(--green)}
.rcpt-miss{color:var(--red)}
.star-flag{font-size:13px;color:var(--amber);margin-right:4px}
.empty{text-align:center;padding:2.5rem;color:var(--text3);border:1px dashed var(--border);border-radius:var(--radius)}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.alert-amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);border-radius:var(--radius-sm);padding:8px 12px;font-size:12px;margin-bottom:12px}
.section-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin:1.4rem 0 .7rem}
.top-bar{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:1.4rem}
.period-nav{display:flex;align-items:center;gap:9px}
.pnav-btn{width:28px;height:28px;border:1px solid var(--border);border-radius:50%;background:var(--bg);color:var(--text);font-size:16px;display:flex;align-items:center;justify-content:center}
.period-lbl{font-size:15px;min-width:140px;text-align:center}
.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:1.1rem}
.period-tag{padding:3px 10px;border-radius:20px;font-size:12px;border:1px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;font-family:inherit}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.bar-bg{flex:1;height:5px;background:var(--bg3);border-radius:3px}
.bar-fill{height:100%;border-radius:3px;background:var(--blue)}
.visa-row{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-bottom:1px solid var(--border);font-size:13px}
.visa-row.flagged{background:var(--amber-bg)}
.visa-check{width:20px;height:20px;border:1.5px solid var(--border2);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:11px;background:var(--bg)}
.visa-check.checked{background:var(--blue);border-color:var(--blue);color:#fff}
.thumb{width:100%;max-height:110px;object-fit:cover;border-radius:var(--radius-sm);margin-bottom:11px;border:1px solid var(--border)}
.modal-wrap{padding:1.75rem 1.25rem;max-width:480px;margin:0 auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem}
.modal-footer{display:flex;gap:8px;margin-top:1.2rem}
.status-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 8px;border-radius:3px}
.tfoot-row td{font-size:13px;padding:9px 11px;border-top:1px solid var(--border2)}
</style>
</head>
<body>
<div id="app"></div>
<input type="file" id="file-rcpt" accept="image/*,.pdf" multiple style="display:none">
<input type="file" id="file-visa" accept="image/*,.pdf" style="display:none">

<script>
const CATS=[
  {label:'Repas / Restaurant',   bg:'#fceaea',c:'#8a1a1a'},
  {label:'Carburant / Essence',  bg:'#fff4d6',c:'#7a4d00'},
  {label:'Logiciels / Abonnements',bg:'#e8f1fb',c:'#174f89'},
  {label:'Développement',        bg:'#eeedfd',c:'#3a2a9a'},
  {label:'Équipements',          bg:'#e6f4e8',c:'#1a5426'},
  {label:'Transport',            bg:'#e0f4ef',c:'#0a4e3a'},
  {label:'Formation',            bg:'#fdf3ee',c:'#8a3a10'},
  {label:'Hébergement',          bg:'#fce8f3',c:'#7a1a52'},
  {label:'Autre',                bg:'#f0efe9',c:'#4a4a42'},
];
const CAT_MAP={};CATS.forEach(c=>CAT_MAP[c.label]=c);
function ci(label){return CAT_MAP[label]||CATS[8];}

let ST={expenses:[],period:nowP(),modal:null,filter:'all',proc:false,procMsg:''};
let _md=null;

function nowP(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
function pLabel(p){const[y,m]=p.split('-');return['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'][+m-1]+' '+y;}
function prevP(p){const[y,m]=p.split('-').map(Number);return m===1?`${y-1}-12`:`${y}-${String(m-1).padStart(2,'0')}`;}
function nextP(p){const[y,m]=p.split('-').map(Number);return m===12?`${y+1}-01`:`${y}-${String(m+1).padStart(2,'0')}`;}
function ePeriod(date){return date?date.substring(0,7):ST.period;}
function fmt(n){return(+n||0).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,' ')+'\u00a0$';}
function fmtD(d){if(!d)return'';const p=d.split('-');return`${p[2]}/${p[1]}`;}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

async function load(){try{const r=await window.storage.get('depenses_v4');if(r)ST.expenses=JSON.parse(r.value);}catch(e){ST.expenses=[];}render();}
async function save(){try{await window.storage.set('depenses_v4',JSON.stringify(ST.expenses));}catch(e){}}
async function addE(data){ST.expenses.push({...data,id:uid(),period:ePeriod(data.date),createdAt:new Date().toISOString()});await save();}
async function updateE(id,data){const i=ST.expenses.findIndex(e=>e.id===id);if(i>=0){ST.expenses[i]={...ST.expenses[i],...data};if(data.date)ST.expenses[i].period=ePeriod(data.date);await save();}}
async function delE(id){ST.expenses=ST.expenses.filter(e=>e.id!==id);await save();}

function toB64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});}
async function thumb(file){return new Promise(res=>{if(!file.type.startsWith('image/')){res(null);return;}const img=new Image();const url=URL.createObjectURL(file);img.onload=()=>{const c=document.createElement('canvas');const s=Math.min(240/img.width,160/img.height,1);c.width=img.width*s;c.height=img.height*s;c.getContext('2d').drawImage(img,0,0,c.width,c.height);URL.revokeObjectURL(url);res(c.toDataURL('image/jpeg',.65));};img.onerror=()=>res(null);img.src=url;});}

async function claude(messages){
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,messages})});
  const d=await r.json();
  return d.content.map(i=>i.text||'').join('');
}

const RCPT_PROMPT=`Analyse cette facture/reçu. Retourne UNIQUEMENT un objet JSON (sans markdown):
{"date":"YYYY-MM-DD","vendor":"fournisseur","amount":0.00,"category":"catégorie","notes":""}
Catégories: Repas / Restaurant, Carburant / Essence, Logiciels / Abonnements, Développement, Équipements, Transport, Formation, Hébergement, Autre.
Si absent, utilise null. UNIQUEMENT LE JSON.`;

const VISA_PROMPT=`Analyse ce relevé de carte Visa. Retourne UNIQUEMENT un tableau JSON (sans markdown).
Pour chaque transaction extrais:
- date: YYYY-MM-DD (si seulement JJ/MM, l'année est 2026)
- vendor: description nettoyée du fournisseur
- amount: montant décimal positif
- starred: true si la ligne a un symbole *, •, ●, ★ ou toute marque spéciale (indique reçu manquant chez l'admin)
- category: catégorie parmi: Repas / Restaurant, Carburant / Essence, Logiciels / Abonnements, Développement, Équipements, Transport, Formation, Hébergement, Autre

Format: [{"date":"2026-01-04","vendor":"Apple.com/Bill","amount":21.83,"starred":false,"category":"Logiciels / Abonnements"},...]
UNIQUEMENT LE TABLEAU JSON.`;

async function extractRcpt(b64,mt){const t=await claude([{role:'user',content:[{type:'image',source:{type:'base64',media_type:mt,data:b64}},{type:'text',text:RCPT_PROMPT}]}]);return JSON.parse(t.replace(/```json|```/g,'').trim());}
async function extractPDF(b64,prompt){const t=await claude([{role:'user',content:[{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},{type:'text',text:prompt}]}]);return JSON.parse(t.replace(/```json|```/g,'').trim());}
async function extractTxt(txt){const t=await claude([{role:'user',content:`${RCPT_PROMPT}\n\nTexte:\n${txt}`}]);return JSON.parse(t.replace(/```json|```/g,'').trim());}

async function handleRcpt(files){
  for(const file of files){
    ST.proc=true;ST.procMsg=`Analyse de ${file.name}…`;render();
    try{
      const b64=await toB64(file);const th=await thumb(file);
      const ex=file.type==='application/pdf'?await extractPDF(b64,RCPT_PROMPT):await extractRcpt(b64,file.type||'image/jpeg');
      _md={view:'form',mode:'add',expense:{date:ex.date||nowD(),vendor:ex.vendor||'',amount:ex.amount||'',category:ex.category||'Autre',notes:ex.notes||'',hasReceipt:true,thumb:th,source:'upload'}};
    }catch(e){
      _md={view:'form',mode:'add',expense:{date:nowD(),vendor:'',amount:'',category:'Autre',notes:'Extraction incomplète',hasReceipt:true,thumb:null,source:'upload'}};
    }
    ST.proc=false;ST.modal=_md.view;render();
  }
}

async function handleVisa(file){
  ST.proc=true;ST.procMsg='Lecture du rapport VISA…';render();
  try{
    const b64=await toB64(file);
    const txs=file.type==='application/pdf'?await extractPDF(b64,VISA_PROMPT):await extractRcpt(b64,'image/jpeg').catch(async()=>{
      const t=await claude([{role:'user',content:[{type:'image',source:{type:'base64',media_type:file.type,data:b64}},{type:'text',text:VISA_PROMPT}]}]);
      return JSON.parse(t.replace(/```json|```/g,'').trim());
    });
    _md={view:'visa',txs:Array.isArray(txs)?txs:[],selected:new Set(Array.isArray(txs)?txs.map((_,i)=>i):[])};
  }catch(e){
    alert('Impossible de lire le rapport VISA. Essaie avec une meilleure résolution.');
  }
  ST.proc=false;ST.modal='visa';render();
}

function nowD(){return new Date().toISOString().split('T')[0];}

function openAdd(){_md={view:'form',mode:'add',expense:{date:nowD(),vendor:'',amount:'',category:'Autre',notes:'',hasReceipt:false,thumb:null,source:'manual'}};ST.modal='form';render();}
function openEdit(id){const e=ST.expenses.find(x=>x.id===id);if(!e)return;_md={view:'form',mode:'edit',expense:{...e}};ST.modal='form';render();}
function openEmail(){_md={view:'email'};ST.modal='email';render();}
function closeModal(){ST.modal=null;_md=null;render();}

function selectCat(label){
  if(!_md||!_md.expense)return;
  _md.expense.category=label;
  document.querySelectorAll('.cat-chip').forEach(b=>{
    const sel=b.dataset.cat===label;
    b.classList.toggle('selected',sel);
  });
}

function syncForm(){
  if(!_md||!_md.expense)return;
  ['vendor','date','amount','notes'].forEach(f=>{
    const el=document.getElementById('f-'+f);
    if(el)_md.expense[f]=el.value;
  });
  const rc=document.getElementById('f-rcpt');
  if(rc)_md.expense.hasReceipt=rc.checked;
}

async function saveForm(){
  syncForm();
  const e=_md.expense;
  const data={vendor:e.vendor||'',date:e.date||nowD(),amount:parseFloat(e.amount)||0,category:e.category||'Autre',notes:e.notes||'',hasReceipt:e.hasReceipt||false,thumb:e.thumb||null,source:e.source||'manual'};
  if(_md.mode==='edit')await updateE(e.id,data);
  else await addE(data);
  closeModal();
}

async function doEmail(){
  const txt=document.getElementById('email-txt')?.value||'';
  if(!txt.trim())return;
  ST.proc=true;ST.procMsg='Analyse du courriel…';render();
  try{
    const ex=await extractTxt(txt);
    _md={view:'form',mode:'add',expense:{date:ex.date||nowD(),vendor:ex.vendor||'',amount:ex.amount||'',category:ex.category||'Autre',notes:ex.notes||'',hasReceipt:true,thumb:null,source:'email'}};
    ST.proc=false;ST.modal='form';
  }catch(e){ST.proc=false;}
  render();
}

async function importVisa(){
  if(!_md||!_md.txs)return;
  const period=ST.period;
  for(const i of _md.selected){
    const tx=_md.txs[i];
    if(!tx)continue;
    await addE({date:tx.date||nowD(),vendor:tx.vendor||'',amount:+tx.amount||0,category:tx.category||'Autre',notes:'',hasReceipt:!tx.starred,visaStarred:!!tx.starred,source:'visa_import'});
  }
  closeModal();
}

function toggleVisaRow(i){
  if(!_md.selected)return;
  if(_md.selected.has(i))_md.selected.delete(i);else _md.selected.add(i);
  const chk=document.getElementById('vc-'+i);
  if(chk){chk.classList.toggle('checked',_md.selected.has(i));chk.textContent=_md.selected.has(i)?'✓':'';}
  const cnt=document.getElementById('visa-count');
  if(cnt)cnt.textContent=`Importer ${_md.selected.size} transaction${_md.selected.size>1?'s':''}`;
}

async function toggleRcpt(id){const e=ST.expenses.find(x=>x.id===id);if(e)await updateE(id,{hasReceipt:!e.hasReceipt});render();}

function render(){
  const app=document.getElementById('app');
  if(ST.modal==='form'){app.innerHTML=renderForm();attachFormEvts();return;}
  if(ST.modal==='email'){app.innerHTML=renderEmail();return;}
  if(ST.modal==='visa'){app.innerHTML=renderVisaPrev();return;}

  const all=ST.expenses.filter(e=>e.period===ST.period);
  const shown=all.filter(e=>{
    if(ST.filter==='missing')return!e.hasReceipt;
    if(ST.filter==='ok')return e.hasReceipt;
    if(ST.filter==='starred')return!!e.visaStarred;
    return true;
  }).sort((a,b)=>(a.date||'').localeCompare(b.date||''));

  const total=all.reduce((s,e)=>s+(+e.amount||0),0);
  const missing=all.filter(e=>!e.hasReceipt).length;
  const missingAmt=all.filter(e=>!e.hasReceipt).reduce((s,e)=>s+(+e.amount||0),0);
  const starred=all.filter(e=>e.visaStarred).length;
  const catT={};all.forEach(e=>{const c=e.category||'Autre';catT[c]=(catT[c]||0)+(+e.amount||0);});
  const maxC=Math.max(.01,...Object.values(catT));
  const periods=[...new Set(ST.expenses.map(e=>e.period))].filter(p=>p!==ST.period).sort().reverse();

  app.innerHTML=`<div class="wrap">
  <div class="top-bar">
    <div><h1>Compte de dépenses</h1><div style="font-size:12px;color:var(--text3);margin-top:2px">P. Alexandre Gauthier · Visa Desjardins ****5022</div></div>
    <div class="period-nav">
      <button class="pnav-btn" onclick="ST.period=prevP(ST.period);render()">‹</button>
      <span class="period-lbl">${pLabel(ST.period)}</span>
      <button class="pnav-btn" onclick="ST.period=nextP(ST.period);render()">›</button>
    </div>
  </div>

  <div class="cards">
    <div class="card"><div class="card-label">Total période</div><div class="card-val">${fmt(total)}</div></div>
    <div class="card"><div class="card-label">Transactions</div><div class="card-val">${all.length}</div></div>
    <div class="card"><div class="card-label">Reçus manquants</div><div class="card-val ${missing>0?'warn':'ok'}">${missing}</div></div>
    <div class="card"><div class="card-label">$ sans reçu</div><div class="card-val ${missingAmt>0?'warn':'ok'}">${fmt(missingAmt)}</div></div>
  </div>

  <div class="drop-zone" id="dz" onclick="document.getElementById('file-rcpt').click()">
    ${ST.proc?`<span class="spinner"></span><span style="color:var(--text2)">${ST.procMsg}</span>`:`
    <div class="dz-title">Glisser une facture ici</div>
    <div class="dz-sub">Photo ou PDF — Claude extrait les données automatiquement</div>
    <div class="dz-btns">
      <button class="btn" onclick="event.stopPropagation();document.getElementById('file-rcpt').click()">📄 Facture / photo</button>
      <button class="btn-visa" onclick="event.stopPropagation();document.getElementById('file-visa').click()">★ Importer rapport VISA</button>
      <button class="btn" onclick="event.stopPropagation();openEmail()">✉ Courriel</button>
      <button class="btn" onclick="event.stopPropagation();openAdd()">+ Manuel</button>
    </div>`}
  </div>

  <div class="pill-row">
    <span style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">Afficher :</span>
    <button class="pill ${ST.filter==='all'?'active':''}" onclick="ST.filter='all';render()">Tous</button>
    <button class="pill ${ST.filter==='missing'?'active':''}" onclick="ST.filter='missing';render()">Reçus manquants</button>
    <button class="pill ${ST.filter==='ok'?'active':''}" onclick="ST.filter='ok';render()">Reçus OK</button>
    ${starred>0?`<button class="pill amber-pill ${ST.filter==='starred'?'active':''}" onclick="ST.filter='starred';render()">★ Étoilés VISA (${starred})</button>`:''}
  </div>

  ${shown.length===0?`<div class="empty">${all.length===0?`Aucune dépense pour ${pLabel(ST.period)}.<br>Scannez une facture ou importez le rapport VISA.`:'Aucune dépense ne correspond au filtre.'}</div>`:`
  <table>
    <thead><tr><th>Date</th><th>Fournisseur</th><th>Catégorie</th><th>Reçu</th><th style="text-align:right">Montant</th><th></th></tr></thead>
    <tbody>${shown.map(e=>{
      const c=ci(e.category);
      return`<tr class="${e.visaStarred?'starred':''}">
        <td style="color:var(--text3);white-space:nowrap;font-size:12px">${e.visaStarred?'<span class="star-flag">★</span>':''}${fmtD(e.date)}</td>
        <td><div>${e.vendor||'—'}</div>${e.notes?`<div style="font-size:11px;color:var(--text3)">${e.notes}</div>`:''}</td>
        <td><span class="badge" style="background:${c.bg};color:${c.c}">${e.category||'Autre'}</span></td>
        <td style="cursor:pointer" onclick="toggleRcpt('${e.id}')">
          <span class="${e.hasReceipt?'rcpt-ok':'rcpt-miss'}"><span class="rcpt-dot" style="background:${e.hasReceipt?'#2d7a3a':'#b83232'}"></span>${e.hasReceipt?'OK':'Manquant'}</span>
        </td>
        <td class="amt ${+e.amount>=200?'big':''}">${fmt(+e.amount)}</td>
        <td style="white-space:nowrap">
          <button class="btn" style="font-size:11px;padding:3px 10px;margin-right:3px" onclick="openEdit('${e.id}')">Modifier</button>
          <button class="btn-ghost" onclick="if(confirm('Supprimer ?'))delE('${e.id}').then(render)">✕</button>
        </td>
      </tr>`;
    }).join('')}</tbody>
    <tfoot><tr class="tfoot-row"><td colspan="4" style="color:var(--text2)">Total affiché</td><td class="amt">${fmt(shown.reduce((s,e)=>s+(+e.amount||0),0))}</td><td></td></tr></tfoot>
  </table>`}

  ${Object.keys(catT).length>0?`
  <div class="section-title">Répartition par catégorie</div>
  ${Object.entries(catT).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>{const c=ci(cat);return`<div class="bar-row"><div style="width:195px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"><span class="badge" style="background:${c.bg};color:${c.c}">${cat}</span></div><div class="bar-bg"><div class="bar-fill" style="width:${(amt/maxC*100).toFixed(1)}%"></div></div><div style="width:85px;text-align:right;font-size:12px">${fmt(amt)}</div></div>`;}).join('')}`:''}

  ${periods.length>0?`<div class="section-title">Autres périodes</div><div class="tag-row">${periods.map(p=>`<button class="period-tag" onclick="ST.period='${p}';render()">${pLabel(p)}</button>`).join('')}</div>`:''}
  </div>`;

  const dz=document.getElementById('dz');
  if(dz&&!ST.proc){
    dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over');},{passive:false});
    dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
    dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');handleRcpt(Array.from(e.dataTransfer.files));});
  }
  document.getElementById('file-rcpt').onchange=e=>{handleRcpt(Array.from(e.target.files));e.target.value='';};
  document.getElementById('file-visa').onchange=e=>{handleVisa(e.target.files[0]);e.target.value='';};
}

function renderForm(){
  const e=_md.expense;const isEdit=_md.mode==='edit';
  const catHtml=CATS.map(c=>`<button class="cat-chip ${e.category===c.label?'selected':''}" data-cat="${c.label}" style="background:${c.bg};color:${c.c}" onclick="selectCat('${c.label}')">${c.label}</button>`).join('');
  return`<div class="modal-wrap">
  <div class="modal-header">
    <h1 style="font-size:18px">${isEdit?'Modifier la dépense':'Nouvelle dépense'}</h1>
    <button class="btn" onclick="closeModal()" style="border:none;background:none;font-size:20px;color:var(--text3);padding:0">✕</button>
  </div>
  ${e.source&&e.source!=='manual'?`<div class="alert-amber">Données extraites automatiquement — vérifiez avant d'enregistrer.</div>`:''}
  ${e.thumb?`<img class="thumb" src="${e.thumb}">`:''}
  <div class="field"><label>Fournisseur</label><input id="f-vendor" value="${e.vendor||''}" placeholder="Nom du fournisseur"></div>
  <div class="field-row">
    <div class="field"><label>Date</label><input id="f-date" type="date" value="${e.date||''}"></div>
    <div class="field"><label>Montant ($)</label><input id="f-amount" type="number" step="0.01" min="0" value="${e.amount||''}" placeholder="0.00"></div>
  </div>
  <div class="field"><label>Catégorie — tap pour sélectionner</label><div class="cat-grid">${catHtml}</div></div>
  <div class="field"><label>Notes (optionnel)</label><input id="f-notes" value="${e.notes||''}" placeholder="Détails..."></div>
  <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
    <input id="f-rcpt" type="checkbox" ${e.hasReceipt?'checked':''} style="width:16px;height:16px;padding:0">
    <label for="f-rcpt" style="font-size:13px;margin:0;color:var(--text);cursor:pointer">Reçu disponible</label>
  </div>
  <div class="modal-footer">
    <button class="btn" onclick="closeModal()" style="flex:1">Annuler</button>
    <button class="btn-primary" onclick="saveForm()" style="flex:2">${isEdit?'Enregistrer':'Ajouter la dépense'}</button>
  </div>
  </div>`;
}

function attachFormEvts(){
  ['vendor','date','amount','notes'].forEach(f=>{
    const el=document.getElementById('f-'+f);
    if(el)el.addEventListener('input',()=>{if(_md&&_md.expense)_md.expense[f]=el.value;});
  });
}

function renderEmail(){
  return`<div class="modal-wrap">
  <div class="modal-header">
    <h1 style="font-size:18px">Facture par courriel</h1>
    <button class="btn" onclick="closeModal()" style="border:none;background:none;font-size:20px;color:var(--text3);padding:0">✕</button>
  </div>
  <p style="font-size:13px;color:var(--text2);margin-bottom:12px">Copiez-collez le contenu de votre courriel de confirmation ou reçu.</p>
  <div class="field"><textarea id="email-txt" rows="11" placeholder="Collez ici le texte du courriel (objet, montant, date, fournisseur...)"></textarea></div>
  <div class="modal-footer">
    <button class="btn" onclick="closeModal()" style="flex:1">Annuler</button>
    <button class="btn-primary" onclick="doEmail()" style="flex:2">${ST.proc?'<span class="spinner"></span>Analyse...':'Extraire les données'}</button>
  </div>
  </div>`;
}

function renderVisaPrev(){
  if(!_md||!_md.txs)return'';
  const txs=_md.txs;
  const flagged=txs.filter(t=>t.starred).length;
  return`<div class="modal-wrap" style="max-width:640px">
  <div class="modal-header">
    <h1 style="font-size:18px">Rapport VISA — ${pLabel(ST.period)}</h1>
    <button class="btn" onclick="closeModal()" style="border:none;background:none;font-size:20px;color:var(--text3);padding:0">✕</button>
  </div>
  ${flagged>0?`<div class="alert-amber">★ ${flagged} transaction${flagged>1?'s':''} marquée${flagged>1?'s':''} sans reçu par l'admin.</div>`:''}
  <p style="font-size:12px;color:var(--text3);margin-bottom:10px">${txs.length} transactions détectées. Décochez celles à exclure.</p>
  <div style="border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:1.1rem;max-height:55vh;overflow-y:auto">
    ${txs.map((t,i)=>`<div class="visa-row ${t.starred?'flagged':''}">
      <div class="visa-check ${_md.selected.has(i)?'checked':''}" id="vc-${i}" onclick="toggleVisaRow(${i})">${_md.selected.has(i)?'✓':''}</div>
      <div style="flex:1">
        <div style="font-size:13px">${t.starred?'<span class="star-flag">★</span>':''}<strong>${t.vendor||'—'}</strong></div>
        <div style="font-size:11px;color:var(--text3)">${fmtD(t.date)} · ${(()=>{const c=ci(t.category);return`<span class="badge" style="background:${c.bg};color:${c.c}">${t.category}</span>`;})()}</div>
      </div>
      <div class="amt" style="font-size:13px">${fmt(+t.amount)}</div>
    </div>`).join('')}
  </div>
  <div class="modal-footer">
    <button class="btn" onclick="closeModal()" style="flex:1">Annuler</button>
    <button class="btn-primary" id="visa-count" onclick="importVisa()" style="flex:2">Importer ${_md.selected.size} transactions</button>
  </div>
  </div>`;
}

load();
</script>
</body>
</html>
