<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compte de depenses</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#eeede8;
  --text:#1a1a18;--text2:#6b6b64;--text3:#9b9b92;
  --border:rgba(0,0,0,0.11);--border2:rgba(0,0,0,0.20);
  --blue:#1a6fbf;--blue-bg:#e8f1fb;
  --green:#2d7a3a;--green-bg:#e6f4e8;
  --red:#b83232;
  --amber:#9a6200;--amber-bg:#fff4d6;--amber-bd:rgba(154,98,0,0.25);
  --purple:#5242b8;--purple-bg:#eeedfd;
  --radius:10px;--radius-sm:7px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1c1c1a;--bg2:#242421;--bg3:#2e2e2a;--text:#f0efe9;--text2:#a0a098;--text3:#6a6a62;--border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.18);}
}
body{font-family:'Georgia','Times New Roman',serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.wrap{max-width:820px;margin:0 auto;padding:1.75rem 1.25rem}
h1{font-size:22px;font-weight:normal;letter-spacing:-.4px}
input,select,textarea{font-family:inherit;font-size:13px;padding:8px 11px;width:100%;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
button{font-family:inherit;cursor:pointer;transition:all .12s}
.btn{padding:6px 14px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:13px}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue);padding:9px 20px;font-size:14px;border-radius:var(--radius-sm)}
.btn-primary:hover{opacity:.88}
.btn-scan{background:#1a5426;color:#fff;border:none;padding:9px 16px;font-size:13px;border-radius:var(--radius-sm)}
.btn-visa{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd);padding:8px 14px;font-size:13px;border-radius:var(--radius-sm)}
.btn-send{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(82,66,184,0.25);padding:8px 14px;font-size:13px;border-radius:var(--radius-sm)}
.btn-ghost{border:none;background:none;padding:4px 8px;font-size:12px;color:var(--text3)}
.btn-ghost:hover{color:var(--red)}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:9px;margin:1.25rem 0}
.card{background:var(--bg2);border-radius:var(--radius);padding:.85rem 1rem}
.card-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.card-val{font-size:18px;color:var(--text)}
.card-val.warn{color:var(--amber)} .card-val.ok{color:var(--green)} .card-val.perso{color:var(--purple)}
.card-sub{font-size:11px;color:var(--text3);margin-top:2px}
table{width:100%;border-collapse:collapse}
th{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;padding:7px 10px;border-bottom:1px solid var(--border);font-weight:normal;text-align:left}
td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:var(--bg2)}
tr.starred td{background:#fde8e8;color:#2a1010}
tr.personal td{background:#f0eeff;color:#1a1050}
.badge{display:inline-block;font-size:11px;padding:2px 7px;border-radius:3px;white-space:nowrap;font-family:sans-serif}
.badge-perso{display:inline-block;background:#e8e4ff;color:#3a2a9a;font-size:10px;padding:1px 6px;border-radius:3px;font-family:sans-serif;margin-left:4px}
.amt{text-align:right;font-variant-numeric:tabular-nums;font-size:13px;white-space:nowrap}
.amt.big{color:var(--amber)}
.amt-sub{font-size:10px;color:var(--text3);text-align:right;font-variant-numeric:tabular-nums}
.dz{border:1.5px dashed var(--border2);border-radius:var(--radius);padding:1.4rem;text-align:center;margin:1.1rem 0;transition:all .15s}
.dz.drag-over{background:var(--blue-bg);border-color:var(--blue)}
.dz-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:12px}
.field{margin-bottom:12px}
.field>label{font-size:12px;color:var(--text2);display:block;margin-bottom:5px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.tax-box{background:var(--bg2);border-radius:var(--radius-sm);padding:11px 12px;margin-bottom:12px}
.perso-box{background:var(--purple-bg);border:1px solid rgba(82,66,184,0.2);border-radius:var(--radius-sm);padding:12px;margin-top:8px}
.tax-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.cat-chip{padding:9px 5px;border-radius:var(--radius-sm);font-size:11px;border:2px solid transparent;cursor:pointer;font-family:inherit;text-align:center;line-height:1.35;transition:all .1s}
.cat-chip.selected{border-color:currentColor;font-weight:bold}
.pill-row{display:flex;gap:6px;margin-bottom:11px;flex-wrap:wrap;align-items:center}
.pill{padding:4px 11px;border-radius:20px;font-size:12px;border:1px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;font-family:inherit}
.pill.active{background:var(--blue-bg);color:var(--blue);border-color:var(--blue)}
.pill.amber.active{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-bd)}
.pill.purple.active{background:var(--purple-bg);color:var(--purple);border-color:rgba(82,66,184,.3)}
.rcpt-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.star-flag{color:var(--amber);margin-right:3px}
.empty{text-align:center;padding:2.5rem;color:var(--text3);border:1px dashed var(--border);border-radius:var(--radius)}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.sync-bar{display:flex;align-items:center;font-size:12px;color:var(--text3);margin-bottom:.75rem;gap:4px;min-height:18px}
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;flex-shrink:0}
.alert-amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd);border-radius:var(--radius-sm);padding:8px 12px;font-size:12px;margin-bottom:12px}
.alert-green{background:var(--green-bg);color:var(--green);border:1px solid rgba(45,122,58,.2);border-radius:var(--radius-sm);padding:8px 12px;font-size:12px;margin-bottom:12px}
.alert-purple{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(82,66,184,.2);border-radius:var(--radius-sm);padding:8px 12px;font-size:12px;margin-bottom:12px}
.section-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin:1.4rem 0 .7rem}
.top-bar{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:.5rem}
.period-nav{display:flex;align-items:center;gap:9px}
.pnav-btn{width:28px;height:28px;border:1px solid var(--border);border-radius:50%;background:var(--bg);color:var(--text);font-size:16px;display:flex;align-items:center;justify-content:center}
.period-lbl{font-size:15px;min-width:140px;text-align:center}
.tag-row{display:flex;flex-wrap:wrap;gap:6px}
.period-tag{padding:3px 10px;border-radius:20px;font-size:12px;border:1px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;font-family:inherit}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.bar-bg{flex:1;height:5px;background:var(--bg3);border-radius:3px}
.bar-fill{height:100%;border-radius:3px;background:var(--blue)}
.thumb-form{width:100%;max-height:120px;object-fit:cover;border-radius:var(--radius-sm);margin-bottom:11px;border:1px solid var(--border)}
.modal-wrap{padding:1.75rem 1.25rem;max-width:500px;margin:0 auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.1rem}
.modal-footer{display:flex;gap:8px;margin-top:1.1rem}
.tfoot-row td{font-size:13px;padding:9px 10px;border-top:1px solid var(--border2)}
.visa-row{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-bottom:1px solid var(--border);font-size:13px}
.visa-row.flagged{background:var(--amber-bg)}
.vchk{width:20px;height:20px;border:1.5px solid var(--border2);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:11px;background:var(--bg)}
.vchk.checked{background:var(--blue);border-color:var(--blue);color:#fff}
.ai-badge{font-size:10px;padding:1px 6px;border-radius:3px;background:var(--blue-bg);color:var(--blue);margin-left:5px;font-family:sans-serif;vertical-align:middle}
.step-box{background:var(--bg2);border-radius:var(--radius);padding:1rem 1.1rem;margin-bottom:10px}
.step-title{font-size:13px;font-weight:bold;margin-bottom:8px;color:var(--text)}
.step-item{font-size:13px;color:var(--text2);line-height:2.1}
.send-preview{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;font-size:12px;color:var(--text2);line-height:1.8;max-height:200px;overflow-y:auto;margin-bottom:12px;white-space:pre-wrap;font-family:monospace,serif}
.link-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.link-row:hover{background:var(--bg2)}
.btn-lier{font-size:11px;padding:3px 9px;margin-right:3px;color:var(--blue);border-color:rgba(26,111,191,.4);border:1px solid rgba(26,111,191,.4);border-radius:var(--radius-sm);background:var(--bg);cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<div id="app"></div>
<input type="file" id="file-scan" accept="image/*" multiple style="display:none">
<input type="file" id="file-lib" accept="image/*,.pdf" multiple style="display:none">
<input type="file" id="file-visa" accept="image/*,.pdf" style="display:none">
<input type="file" id="file-eml" accept=".eml,.msg" multiple style="display:none">
<script>
var CATS=[
  {label:'Repas / Restaurant',  bg:'#fceaea',c:'#8a1a1a'},
  {label:'Carburant / Essence', bg:'#fff4d6',c:'#7a4d00'},
  {label:'Logiciels / Abo.',    bg:'#e8f1fb',c:'#174f89'},
  {label:'Developpement',       bg:'#eeedfd',c:'#3a2a9a'},
  {label:'Equipements',         bg:'#e6f4e8',c:'#1a5426'},
  {label:'Transport',           bg:'#e0f4ef',c:'#0a4e3a'},
  {label:'Formation',           bg:'#fdf3ee',c:'#8a3a10'},
  {label:'Hebergement',         bg:'#fce8f3',c:'#7a1a52'},
  {label:'Autre',               bg:'#f0efe9',c:'#4a4a42'}
];
var CM={};CATS.forEach(function(c){CM[c.label]=c;});
function ci(l){return CM[l]||CATS[8];}

var ST={expenses:[],period:nowP(),modal:null,filter:'all',proc:false,msg:'',adjEmail:''};
var _md=null;
var SYNC={status:'off',msg:'',sha:null};
var GH={token:'',owner:'',repo:'depenses'};

function nowP(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function nowD(){return new Date().toISOString().split('T')[0];}
function pLabel(p){var a=p.split('-');var M=['Janvier','Fevrier','Mars','Avril','Mai','Juin','Juillet','Aout','Septembre','Octobre','Novembre','Decembre'];return M[parseInt(a[1])-1]+' '+a[0];}
function prevP(p){var y=parseInt(p),m=parseInt(p.split('-')[1]);y=parseInt(p.split('-')[0]);return m===1?(y-1)+'-12':y+'-'+String(m-1).padStart(2,'0');}
function nextP(p){var y=parseInt(p.split('-')[0]),m=parseInt(p.split('-')[1]);return m===12?(y+1)+'-01':y+'-'+String(m+1).padStart(2,'0');}
function ep(d){return d?d.substring(0,7):ST.period;}
function fmt(n){return(+n||0).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,' ')+'\u00a0$';}
function fd(d){if(!d)return'';var p=d.split('-');return p[2]+'/'+p[1];}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function n2(v){var f=parseFloat(v);return isNaN(f)?null:f;}
function h(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function b64enc(str){return btoa(unescape(encodeURIComponent(str)));}
function b64dec(str){return decodeURIComponent(escape(atob(str.replace(/\n/g,''))));}
function getApiKey(){return localStorage.getItem('anthropic_api_key')||'';}
function saveApiKey(k){localStorage.setItem('anthropic_api_key',k);}
function saveApiKeyFromUI(){var el=document.getElementById('ant-key');var k=el?el.value.trim():'';if(!k){alert('Entre ta cle API Anthropic');return;}saveApiKey(k);var btn=document.getElementById('ant-save-btn');if(btn){btn.textContent='Sauvegarde !';setTimeout(function(){btn.textContent='Sauvegarder la cle';},1500);}}

async function loadLocal(){try{var r=await window.storage.get('dep_v9');if(r){var d=JSON.parse(r.value);ST.expenses=d.expenses||[];ST.adjEmail=d.adjEmail||'';}}catch(e){ST.expenses=[];}}
async function saveLocal(){try{await window.storage.set('dep_v9',JSON.stringify({expenses:ST.expenses,adjEmail:ST.adjEmail}));}catch(e){}}
function loadGHConfig(){try{var c=localStorage.getItem('gh_cfg');if(c)Object.assign(GH,JSON.parse(c));}catch(e){}}
function saveGHConfig(){try{localStorage.setItem('gh_cfg',JSON.stringify({token:GH.token,owner:GH.owner,repo:GH.repo}));}catch(e){}}
function ghHeaders(){return{'Authorization':'token '+GH.token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'};}
function ghUrl(){return 'https://api.github.com/repos/'+GH.owner+'/'+GH.repo+'/contents/depenses-data.json';}

async function syncFromGitHub(){
  if(!GH.token||!GH.owner){SYNC.status='no-config';return false;}
  SYNC.status='syncing';SYNC.msg='Connexion...';renderSyncBar();
  try{
    var r=await fetch(ghUrl(),{headers:ghHeaders()});
    if(r.status===404){SYNC.sha=null;await syncToGitHub();return true;}
    if(!r.ok){SYNC.status='error';SYNC.msg='Erreur HTTP '+r.status;renderSyncBar();return false;}
    var d=await r.json();
    SYNC.sha=d.sha;
    var remote=JSON.parse(b64dec(d.content));
    var remExp=remote.expenses||[];
    var merged={};
    remExp.forEach(function(e){merged[e.id]=e;});
    ST.expenses.forEach(function(e){merged[e.id]=e;});
    ST.expenses=Object.values(merged).sort(function(a,b){return(a.date||'').localeCompare(b.date||'');});
    if(remote.adjEmail)ST.adjEmail=remote.adjEmail;
    await saveLocal();
    await syncToGitHub();
    SYNC.status='ok';SYNC.msg='Synchronise - '+new Date().toLocaleTimeString('fr-CA');
    renderSyncBar();return true;
  }catch(e){SYNC.status='error';SYNC.msg='Erreur: '+e.message;renderSyncBar();return false;}
}

async function syncToGitHub(){
  if(!GH.token||!GH.owner)return;
  var data={expenses:ST.expenses,adjEmail:ST.adjEmail};
  var content=b64enc(JSON.stringify(data));
  var body={message:'Depenses '+nowD(),content:content};
  if(SYNC.sha)body.sha=SYNC.sha;
  try{
    var r=await fetch(ghUrl(),{method:'PUT',headers:ghHeaders(),body:JSON.stringify(body)});
    if(r.ok){var d=await r.json();SYNC.sha=d.content.sha;SYNC.status='ok';SYNC.msg='Synchronise - '+new Date().toLocaleTimeString('fr-CA');}
    else{SYNC.status='error';SYNC.msg='Erreur sauvegarde HTTP '+r.status;}
  }catch(e){SYNC.status='error';SYNC.msg='Erreur: '+e.message;}
  renderSyncBar();
}

function renderSyncBar(){
  var bar=document.getElementById('sync-bar');if(!bar)return;
  var dot='#ccc',label='';
  if(SYNC.status==='ok'){dot='#2d7a3a';label='\u2713 '+SYNC.msg;}
  else if(SYNC.status==='syncing'){dot='#1a6fbf';label='\u21bb '+SYNC.msg;}
  else if(SYNC.status==='error'){dot='#b83232';label='\u26a0 '+SYNC.msg;}
  else if(SYNC.status==='no-config'){dot='#ccc';label='Sync non configure';}
  bar.innerHTML='<span class="sync-dot" style="background:'+dot+'"></span>'+label;
}

async function load(){
  loadGHConfig();
  if(GH.token&&GH.owner){var ok=await syncFromGitHub();if(!ok)await loadLocal();}
  else{await loadLocal();SYNC.status='no-config';}
  render();
}
async function save(){await saveLocal();syncToGitHub();}

async function addE(data){ST.expenses.push(Object.assign({},data,{id:uid(),period:ep(data.date),createdAt:new Date().toISOString()}));await save();}
async function updE(id,data){var i=ST.expenses.findIndex(function(e){return e.id===id;});if(i>=0){Object.assign(ST.expenses[i],data);if(data.date)ST.expenses[i].period=ep(data.date);await save();}}
async function delE(id){ST.expenses=ST.expenses.filter(function(e){return e.id!==id;});await save();}

function toB64(file){return new Promise(function(res,rej){var r=new FileReader();r.onload=function(){res(r.result.split(',')[1]);};r.onerror=rej;r.readAsDataURL(file);});}
async function prepImg(file){
  if(file.type==='application/pdf')return toB64(file);
  return new Promise(function(res){
    var img=new Image(),url=URL.createObjectURL(file);
    img.onload=function(){var MAX=2400,s=Math.min(MAX/img.width,MAX/img.height,1);var c=document.createElement('canvas');c.width=Math.round(img.width*s);c.height=Math.round(img.height*s);var ctx=c.getContext('2d');ctx.filter='contrast(1.08) brightness(1.02)';ctx.drawImage(img,0,0,c.width,c.height);URL.revokeObjectURL(url);res(c.toDataURL('image/jpeg',.93).split(',')[1]);};
    img.onerror=function(){toB64(file).then(res);};img.src=url;
  });
}
async function mkThumb(file){
  return new Promise(function(res){
    if(!file.type.startsWith('image/')){res(null);return;}
    var img=new Image(),url=URL.createObjectURL(file);
    img.onload=function(){var s=Math.min(300/img.width,180/img.height,1);var c=document.createElement('canvas');c.width=Math.round(img.width*s);c.height=Math.round(img.height*s);c.getContext('2d').drawImage(img,0,0,c.width,c.height);URL.revokeObjectURL(url);res(c.toDataURL('image/jpeg',.72));};
    img.onerror=function(){res(null);};img.src=url;
  });
}

async function callAI(messages){
  var apiKey=getApiKey();
  if(!apiKey)throw new Error('Cle API manquante. Ouvre Parametres (\u2699) pour configurer.');
  var r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,messages:messages})});
  var d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return d.content.map(function(i){return i.text||'';}).join('');
}
function parseJSON(text){
  var c=text.replace(/```json|```/g,'').trim();
  try{return JSON.parse(c);}catch(e){}
  var a=c.match(/\[[\s\S]*\]/);if(a)try{return JSON.parse(a[0]);}catch(e){}
  var o=c.match(/\{[\s\S]*\}/);if(o)try{return JSON.parse(o[0]);}catch(e){}
  throw new Error('Format non reconnu');
}
var P_RCPT='Analyse cette facture. UNIQUEMENT un objet JSON:\n{"date":"YYYY-MM-DD","vendor":"fournisseur","amount_ttc":0.00,"amount_ht":0.00,"tps":0.00,"tvq":0.00,"category":"cat","notes":""}\nCategories: Repas / Restaurant, Carburant / Essence, Logiciels / Abo., Developpement, Equipements, Transport, Formation, Hebergement, Autre. Valeur absente=null. UNIQUEMENT JSON.';
var P_VISA='Analyse ce releve Visa. UNIQUEMENT tableau JSON:\n[{"date":"YYYY-MM-DD","vendor":"nom","amount":0.00,"starred":false,"category":"cat"}]\nstarred=true si *, bullet ou marque speciale. Categories: Repas / Restaurant, Carburant / Essence, Logiciels / Abo., Developpement, Equipements, Transport, Formation, Hebergement, Autre. UNIQUEMENT TABLEAU JSON.';

async function doExtract(b64,mt,prompt){
  var t;
  if(mt==='application/pdf')t=await callAI([{role:'user',content:[{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},{type:'text',text:prompt}]}]);
  else t=await callAI([{role:'user',content:[{type:'image',source:{type:'base64',media_type:mt,data:b64}},{type:'text',text:prompt}]}]);
  return parseJSON(t);
}

function normalize(s){return(s||'').toLowerCase().replace(/[^a-z0-9]/g,'');}
function autoMatch(newExp){
  if(!newExp.amount_ttc||!newExp.vendor)return;
  var amt=parseFloat(newExp.amount_ttc)||0;
  var v=normalize(newExp.vendor).substring(0,6);
  if(v.length<3)return;
  var matches=ST.expenses.filter(function(e){
    if(e.id===newExp.id||e.source!=='visa_import'||e.matchedReceiptId)return false;
    if(Math.abs((parseFloat(e.amount_ttc)||0)-amt)>0.02)return false;
    var ev=normalize(e.vendor);
    return ev.includes(v)||v.includes(ev.substring(0,6));
  });
  if(matches.length!==1)return;
  var visa=matches[0];
  var vi=ST.expenses.findIndex(function(e){return e.id===visa.id;});
  var ri=ST.expenses.findIndex(function(e){return e.id===newExp.id;});
  if(vi>=0)Object.assign(ST.expenses[vi],{hasReceipt:true,matchedReceiptId:newExp.id,visaStarred:false});
  if(ri>=0)Object.assign(ST.expenses[ri],{matchedVisaId:visa.id});
  save();
  var b=document.createElement('div');
  b.style.cssText='position:fixed;top:1rem;right:1rem;background:#1a5426;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;font-family:Georgia,serif;z-index:9999;box-shadow:0 2px 8px rgba(0,0,0,.3)';
  b.textContent='\u2713 Facture liee automatiquement a '+visa.vendor;
  document.body.appendChild(b);
  setTimeout(function(){if(b.parentNode)b.parentNode.removeChild(b);},3500);
}

async function handleVisa(file){
  ST.proc=true;ST.msg='Lecture du rapport VISA...';render();
  var rawResp='';
  try{
    if(file.size>8000000){ST.proc=false;_md={view:'visa-err',errMsg:'Fichier trop volumineux. Essaie une photo JPG de la page des transactions.'};ST.modal='visa-err';render();return;}
    var b64=await prepImg(file);
    var mt=file.type==='application/pdf'?'application/pdf':(file.type||'image/jpeg');
    var msgs;
    if(mt==='application/pdf')msgs=[{role:'user',content:[{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},{type:'text',text:P_VISA}]}];
    else msgs=[{role:'user',content:[{type:'image',source:{type:'base64',media_type:mt,data:b64}},{type:'text',text:P_VISA}]}];
    rawResp=await callAI(msgs);
    var arr=null;
    try{var txs=parseJSON(rawResp);arr=Array.isArray(txs)?txs:(txs.transactions||txs.data||null);}catch(e){}
    if(!arr||arr.length===0){
      ST.msg='Correction du format...';render();
      var repairMsg='Retourne UNIQUEMENT un tableau JSON corrige sans aucun texte: '+rawResp;
      var repaired=await callAI([{role:'user',content:repairMsg}]);
      rawResp=repaired;
      try{var txs2=parseJSON(repaired);arr=Array.isArray(txs2)?txs2:(txs2.transactions||txs2.data||null);}catch(e){}
    }
    if(!arr||arr.length===0)throw new Error('Aucune transaction detectee');
    var sel=new Set();for(var i=0;i<arr.length;i++)sel.add(i);
    _md={view:'visa',txs:arr,sel:sel};
    ST.proc=false;ST.modal='visa';render();
  }catch(err){ST.proc=false;_md={view:'visa-err',raw:rawResp,errMsg:err.message};ST.modal='visa-err';render();}
}

async function handleEml(file){
  ST.proc=true;ST.msg='Lecture du courriel...';render();
  try{
    var text=await new Promise(function(res,rej){var r=new FileReader();r.onload=function(){res(r.result);};r.onerror=rej;r.readAsText(file,'utf-8');});
    var subjectMatch=text.match(/^Subject:\s*(.+)/im);
    var subject=subjectMatch?subjectMatch[1].trim():'';
    var bodyStart=text.indexOf('\r\n\r\n');if(bodyStart===-1)bodyStart=text.indexOf('\n\n');
    var body=bodyStart>=0?text.substring(bodyStart+2):'';
    body=body.replace(/<[^>]+>/g,' ').replace(/=\r?\n/g,'').replace(/=([0-9A-Fa-f]{2})/g,function(_,hx){return String.fromCharCode(parseInt(hx,16));}).replace(/\s+/g,' ').trim();
    ST.msg='Extraction des donnees...';render();
    var t=await callAI([{role:'user',content:P_RCPT+'\n\nObjet: '+subject+'\n\n'+body.substring(0,3000)}]);
    var ex=parseJSON(t);
    _md={view:'form',mode:'add',expense:{date:ex.date||nowD(),vendor:ex.vendor||'',amount_ttc:ex.amount_ttc||'',amount_ht:ex.amount_ht||'',tps:ex.tps||'',tvq:ex.tvq||'',category:ex.category||'Autre',notes:ex.notes||subject||'',hasReceipt:true,isPersonal:false,thumb:null,source:'email_drag'}};
    ST.proc=false;ST.modal='form';render();

    ST.proc=false;

  }
}

      '<td style="color:var(--text3);white-space:nowrap;font-size:12px">'+(e.visaStarred?'<span class="star-flag">\u2605</span>':'')+h(fd(e.date))+'</td>'+
      '<td><div>'+h(e.vendor||'\u2014')+(e.isPersonal?'<span class="badge-perso">Perso - rembourser</span>':'')+'</div>'+(e.notes?'<div style="font-size:11px;color:var(--text3)">'+h(e.notes)+'</div>':'')+'</td>'+
      '<td><span class="badge" style="background:'+c.bg+';color:'+c.c+'">'+h(e.category||'Autre')+'</span></td>'+

  var catBars=Object.entries(catT).sort(function(a,b){return b[1]-a[1];}).map(function(kv){

  else if(SYNC.status==='error'){syncDot='#b83232';syncTxt='\u26a0 '+SYNC.msg;}

    '<div><h1>Compte de d\u00e9penses</h1><div style="font-size:12px;color:var(--text3);margin-top:2px">P. Alexandre Gauthier \u00b7 Visa Desjardins ****5022</div></div>'+
    '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'+

  '</div>'+
  '<div class="dz" id="dz">'+
    (ST.proc?'<span class="spinner"></span><span style="color:var(--text2)">'+ST.msg+'</span>':

      '<button class="btn-scan" onclick="ST.modal=\'scan-tip\';_md={};render()">\uD83D\uDCF7 Scanner</button>'+

      '<button class="btn-visa" onclick="document.getElementById(\'file-visa\').click()">\u2605 Rapport VISA</button>'+
      '<button class="btn" onclick="document.getElementById(\'file-eml\').click()">\uD83D\uDCE7 Courriel .eml</button>'+
      '<button class="btn" onclick="ST.modal=\'email\';_md={};render()">\u270F Coller texte</button>'+
      '<button class="btn" onclick="openAdd()">+ Manuel</button>'+
    '</div>')+
  '</div>'+
  '<div class="pill-row">'+
    '<span style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">Filtrer\u00a0:</span>'+
    '<button class="pill '+(ST.filter==='all'?'active':'')+'" onclick="ST.filter=\'all\';render()">Tous</button>'+
    '<button class="pill '+(ST.filter==='missing'?'active':'')+'" onclick="ST.filter=\'missing\';render()">Re\u00e7us manquants</button>'+
    '<button class="pill '+(ST.filter==='ok'?'active':'')+'" onclick="ST.filter=\'ok\';render()">Re\u00e7us OK</button>'+
    (starred>0?'<button class="pill amber '+(ST.filter==='starred'?'active':'')+'" onclick="ST.filter=\'starred\';render()">\u2605 \u00c9toil\u00e9s ('+starred+')</button>':'')+
    (perso.length>0?'<button class="pill purple '+(ST.filter==='personal'?'active':'')+'" onclick="ST.filter=\'personal\';render()">\u267B Perso ('+perso.length+')</button>':'')+
  '</div>'+
  (shown.length===0?'<div class="empty">'+(all.length===0?'Aucune d\u00e9pense pour '+pLabel(ST.period)+'.':'Aucune d\u00e9pense ne correspond au filtre.')+'</div>':
    '<table><thead><tr><th>Date</th><th>Fournisseur</th><th>Cat\u00e9gorie</th><th>Re\u00e7u</th><th style="text-align:right">TTC</th><th style="text-align:right">Avant taxes</th><th></th></tr></thead><tbody>'+rows+'</tbody><tfoot><tr class="tfoot-row"><td colspan="4" style="color:var(--text2)">Total affich\u00e9</td><td class="amt">'+fmt(shown.reduce(function(s,e){return s+(+e.amount_ttc||0);},0))+'</td><td></td><td></td></tr></tfoot></table>')+
  (Object.keys(catT).length>0?'<div class="section-title">R\u00e9partition par cat\u00e9gorie</div>'+catBars:'')+
  (periods.length>0?'<div class="section-title">Autres p\u00e9riodes</div><div class="tag-row">'+periods.map(function(p){return'<button class="period-tag" onclick="ST.period=\''+p+'\';render()">'+pLabel(p)+'</button>';}).join('')+'</div>':'')+
  '</div>';

  var dz=document.getElementById('dz');
  if(dz&&!ST.proc){
    dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('drag-over');},{passive:false});
    dz.addEventListener('dragleave',function(){dz.classList.remove('drag-over');});
    dz.addEventListener('drop',function(ev){
      ev.preventDefault();dz.classList.remove('drag-over');
      var files=Array.from(ev.dataTransfer.files);
      var emls=files.filter(function(f){return f.name.toLowerCase().endsWith('.eml')||f.name.toLowerCase().endsWith('.msg');});
      var others=files.filter(function(f){return!f.name.toLowerCase().endsWith('.eml')&&!f.name.toLowerCase().endsWith('.msg');});
      emls.forEach(function(f){handleEml(f);});
      if(others.length>0)handleRcpt(others,'upload');
    });
  }
  document.getElementById('file-scan').onchange=function(e){handleRcpt(Array.from(e.target.files),'scan');e.target.value='';};
  document.getElementById('file-lib').onchange=function(e){handleRcpt(Array.from(e.target.files),'upload');e.target.value='';};
  document.getElementById('file-visa').onchange=function(e){handleVisa(e.target.files[0]);e.target.value='';};
  document.getElementById('file-eml').onchange=function(e){Array.from(e.target.files).forEach(function(f){handleEml(f);});e.target.value='';};
}

  return '<div class="modal-wrap" style="max-width:520px">'+
  '<div class="modal-header"><div><h1 style="font-size:18px">Lier une facture</h1><div style="font-size:12px;color:var(--text3);margin-top:2px">'+h(fd(visa.date))+' \u00b7 '+h(visa.vendor||'')+' \u00b7 '+fmt(+visa.amount_ttc)+'</div></div><button onclick="closeModal()" style="border:none;background:none;font-size:20px;color:var(--text3);padding:0">\u2715</button></div>'+
  '<p style="font-size:12px;color:var(--text2);margin-bottom:10px">Clique sur une facture pour la lier \u00e0 cette transaction.</p>'+
  '<div style="border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;max-height:55vh;overflow-y:auto">'+rows+'</div>'+
  '<div class="modal-footer"><button class="btn" onclick="closeModal()" style="flex:1">Annuler</button><button class="btn-primary" onclick="closeModal();openAdd()" style="flex:2">+ Scanner une nouvelle facture</button></div></div>';
}

function vSend(){
  var all=ST.expenses.filter(function(e){return e.period===ST.period;});
  var miss=all.filter(function(e){return!e.hasReceipt;}).length;
  var persoAmt=all.filter(function(e){return e.isPersonal;}).reduce(function(s,e){return s+(+e.amount_ttc||0);},0);
  var body=_md&&_md.body?_md.body:generateMailBody(all);
  return '<div class="modal-wrap" style="max-width:580px">'+
  '<div class="modal-header"><h1 style="font-size:18px">\u2709 Envoyer \u00e0 l\u2019adjointe</h1><button onclick="closeModal()" style="border:none;background:none;font-size:20px;color:var(--text3);padding:0">\u2715</button></div>'+
  (miss>0?'<div class="alert-amber">'+miss+' re\u00e7u'+(miss>1?'s':'')+' manquant'+(miss>1?'s':'')+'.</div>':'')+
  (persoAmt>0?'<div class="alert-purple">D\u00e9penses personnelles : '+fmt(persoAmt)+' \u00e0 rembourser.</div>':'')+
  '<div class="field"><label>Courriel de l\u2019adjointe</label><input id="adj-email" type="email" value="'+h(ST.adjEmail)+'" placeholder="adjointe@entreprise.com"></div>'+
  '<div class="field"><label>Aper\u00e7u</label><div class="send-preview">'+h(body)+'</div></div>'+
  '<div style="font-size:12px;color:var(--text3);margin-bottom:12px">T\u00e9l\u00e9chargez le rapport, puis joignez-le au courriel.</div>'+
  '<div class="modal-footer" style="flex-wrap:wrap"><button class="btn" onclick="closeModal()" style="flex:1">Annuler</button><button class="btn" onclick="doDownloadReport()" style="flex:1.5">\uD83D\uDCE5 Rapport</button><button class="btn-primary" onclick="doOpenMail()" style="flex:2">\u2709 Ouvrir Mail</button></div></div>';
}

function vSync(){
  var isConfigured=GH.token&&GH.owner;
  var statusColor='#ccc',statusText='Non configur\u00e9';
  if(SYNC.status==='ok'){statusColor='#2d7a3a';statusText='\u2713 '+SYNC.msg;}
  else if(SYNC.status==='syncing'){statusColor='#1a6fbf';statusText='\u21bb '+SYNC.msg;}
  else if(SYNC.status==='error'){statusColor='#b83232';statusText='\u26a0 '+SYNC.msg;}
  return '<div class="modal-wrap">'+
  '<div class="modal-header"><h1 style="font-size:18px">\u2699 Param\u00e8tres</h1><button onclick="closeModal()" style="border:none;background:none;font-size:20px;color:var(--text3);padding:0">\u2715</button></div>'+
  '<div style="display:flex;align-items:center;gap:6px;font-size:12px;padding:8px 10px;border-radius:var(--radius-sm);background:var(--bg2);margin-bottom:1rem"><span style="width:8px;height:8px;border-radius:50%;background:'+statusColor+';flex-shrink:0;display:inline-block"></span><span>'+statusText+'</span></div>'+
  '<div style="padding-bottom:14px;margin-bottom:14px;border-bottom:1px solid var(--border)">'+
    '<div style="font-size:13px;font-weight:bold;margin-bottom:6px;color:var(--text)">Cl\u00e9 API Anthropic (requis pour IA)</div>'+
    '<div style="font-size:12px;color:var(--text2);margin-bottom:8px">Obtiens ta cl\u00e9 sur <strong>console.anthropic.com</strong> \u2192 API Keys \u2192 Create Key</div>'+
    '<input id="ant-key" type="password" value="'+h(getApiKey())+'" placeholder="sk-ant-api03-..." style="font-family:monospace,serif;margin-bottom:6px">'+
    '<button id="ant-save-btn" onclick="saveApiKeyFromUI()" style="width:100%;padding:7px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:12px;cursor:pointer;font-family:inherit">Sauvegarder la cl\u00e9</button>'+
  '</div>'+
  '<div style="font-size:13px;font-weight:bold;margin-bottom:6px;color:var(--text)">\u2601 Synchronisation GitHub PC \u2194 iPhone</div>'+
  '<div class="step-box"><div class="step-title">Configuration initiale (une seule fois)</div>'+
    '<div class="step-item">1. Va sur github.com \u2192 Settings \u2192 Developer settings</div>'+
    '<div class="step-item">2. Personal access tokens \u2192 Tokens (classic) \u2192 Generate new</div>'+
    '<div class="step-item">3. Coche <strong>repo</strong> \u2192 G\u00e9n\u00e9rer \u2192 Copier le token</div>'+
    '<div class="step-item">4. Colle-le ci-dessous avec ton nom GitHub</div>'+
  '</div>'+
  '<div class="field"><label>Token GitHub (ghp_...)</label><input id="gh-token" type="password" value="'+h(GH.token)+'" placeholder="ghp_xxxxxxxxxxxx"></div>'+
  '<div class="grid2"><div class="field" style="margin:0"><label>Nom utilisateur GitHub</label><input id="gh-owner" value="'+h(GH.owner)+'" placeholder="pagau-cg"></div><div class="field" style="margin:0"><label>Nom du repo</label><input id="gh-repo" value="'+h(GH.repo||'depenses')+'" placeholder="depenses"></div></div>'+
  '<div style="font-size:11px;color:var(--text3);margin-top:4px;margin-bottom:12px">Le token est sauvegard\u00e9 localement. \u00c0 r\u00e9p\u00e9ter sur chaque appareil.</div>'+
  (isConfigured?'<button class="btn" style="width:100%;margin-bottom:8px" onclick="manualSync()">\u21bb R\u00e9synchroniser maintenant</button>':'')+
  '<div class="modal-footer"><button class="btn" onclick="closeModal()" style="flex:1">Fermer</button><button id="gh-save-btn" class="btn-primary" onclick="saveGHSettings()" style="flex:2">Enregistrer et connecter</button></div></div>';
}

load();
</script>
</body>
</html>
